<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <title>TITULO</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="align">
            <div class="fundo">
                <div class="input">
                    <div class="historico">
                        <p id="historico"></p>
                    </div>
                    
                    <p id="input">0</p>
                </div>
                <div class="linha-botao">
                    <div class="botao" data-target="input" data-value="1">1</div>
                </div>
                <div class="linha-botao">
                    <div class="botao" data-target="input" data-value="-">-</div>
                    <div class="botao" data-target="input" data-value="*">*</div>
                    <div class="botao" data-target="input" data-value="/">/</div>
                </div>
                <div class="linha-botao">
                    <div class="botao" data-target="input" data-value="ok">OK</div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
